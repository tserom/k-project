# 单域名入口（k-project.com）：本地开发模式。
# 上游指向宿主机（pnpm dev / go run）；网关容器常驻，各服务按需在本机启动。
# 端口规则：见 docs/WORKSPACE.md 端口名单（前端 8100+，后端 8500+）。

server {
    listen 80 default_server;
    server_name k-project.com;

    # 访问宿主机进程；macOS / Windows Docker Desktop 自带 host.docker.internal
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/inventory/ {
        rewrite ^/api/inventory/(.*)$ /api/$1 break;
        set $inventory_api_upstream host.docker.internal:8501;
        proxy_pass http://$inventory_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $api_upstream host.docker.internal:8500;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/hello/ {
        rewrite ^/micro/hello/(.*)$ /$1 break;
        set $hello_upstream host.docker.internal:8101;
        proxy_pass http://$hello_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/user/ {
        rewrite ^/micro/user/(.*)$ /$1 break;
        set $user_upstream host.docker.internal:8102;
        proxy_pass http://$user_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/inventory/ {
        rewrite ^/micro/inventory/(.*)$ /$1 break;
        set $inventory_app_upstream host.docker.internal:8103;
        proxy_pass http://$inventory_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $host_upstream host.docker.internal:8100;
        proxy_pass http://$host_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
