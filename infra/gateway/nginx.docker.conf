# 单域名入口（k-project.com）：所有服务同源，浏览器只访问本网关。
# 上游为 Compose 服务名；按需启动容器时配合 resolver + 变量 proxy_pass，网关可独立常驻。
# 端口规则：见 docs/WORKSPACE.md 端口名单（前端 8100+，后端 8500+）。

server {
    listen 80 default_server;
    server_name k-project.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name k-project.com;

    include /etc/nginx/gateway/nginx.ssl-params.conf;

    # Docker 内置 DNS；变量 proxy_pass 在请求时解析，避免上游未启动时 nginx 退出
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/inventory/ {
        set $inventory_api_upstream inventory-backend:8501;
        rewrite ^/api/inventory/(.*)$ /api/$1 break;
        proxy_pass http://$inventory_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $api_upstream user-backend:8500;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 子应用：去掉路径前缀后转发（适配 Vite base: './'）
    location /micro/hello/ {
        set $hello_upstream hello-front:8101;
        rewrite ^/micro/hello/(.*)$ /$1 break;
        proxy_pass http://$hello_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/user/ {
        set $user_upstream user-front:8102;
        rewrite ^/micro/user/(.*)$ /$1 break;
        proxy_pass http://$user_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/inventory/ {
        set $inventory_app_upstream inventory-front:8103;
        rewrite ^/micro/inventory/(.*)$ /$1 break;
        proxy_pass http://$inventory_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 父应用（壳）
    location / {
        set $host_upstream host:8100;
        proxy_pass http://$host_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
