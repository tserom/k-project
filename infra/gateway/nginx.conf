# 单域名入口（k-project.com）：所有服务同源，浏览器只访问本网关。
# 端口规则：见 docs/WORKSPACE.md 端口名单（前端 8100+，后端 8500+）。

upstream host_app {
    server host:8100;
}

upstream hello_app {
    server hello-front:8101;
}

upstream user_app {
    server user-front:8102;
}

upstream api_app {
    server user-backend:8500;
}

server {
    listen 80 default_server;
    server_name k-project.com;

    # Docker 内置 DNS；inventory 用变量 proxy_pass，避免启动时解析不到 upstream 导致 nginx 退出
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/inventory/ {
        rewrite ^/api/inventory/(.*)$ /api/$1 break;
        set $inventory_api_upstream inventory-backend:8501;
        proxy_pass http://$inventory_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 子应用：去掉路径前缀后转发（适配 Vite base: './'）
    location /micro/hello/ {
        rewrite ^/micro/hello/(.*)$ /$1 break;
        proxy_pass http://hello_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/user/ {
        rewrite ^/micro/user/(.*)$ /$1 break;
        proxy_pass http://user_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /micro/inventory/ {
        rewrite ^/micro/inventory/(.*)$ /$1 break;
        set $inventory_app_upstream inventory-front:8103;
        proxy_pass http://$inventory_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 父应用（壳）
    location / {
        proxy_pass http://host_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
