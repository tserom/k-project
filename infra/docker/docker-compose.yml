# 在 k-project 根目录执行:
#   docker compose -f infra/docker/docker-compose.yml up --build
#
# 浏览器只访问 http://k-project.com/（需 hosts: 127.0.0.1 k-project.com）
# 端口名单见 docs/WORKSPACE.md

services:
  mysql:
    image: ${MYSQL_IMAGE:-public.ecr.aws/docker/library/mysql:8.0}
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: app
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdevroot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  user-backend:
    build:
      context: ../../apps/user-backend
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8500"
      GIN_MODE: release
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: devroot
      DB_NAME: app
      JWT_SECRET: docker-dev-only-replace-with-long-random-string
      JWT_EXPIRE_HOURS: "24"
    depends_on:
      mysql:
        condition: service_healthy

  hello-front:
    build:
      context: ../../apps/hello-front
      dockerfile: Dockerfile

  user-front:
    build:
      context: ../../apps/user-front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""

  host:
    build:
      context: ../../apps/host
      dockerfile: Dockerfile
      args:
        VITE_HELLO_FRONT_URL: /micro/hello/
        VITE_USER_FRONT_URL: /micro/user/
    depends_on:
      - hello-front
      - user-front

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - host
      - hello-front
      - user-front
      - user-backend
