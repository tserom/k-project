# 可选附录：单域名同源网关（host 在 /，demo 子应用在 /micro/demo/）
server {
    listen 80;
    server_name _;

    # 父应用（SPA：未命中文件回退 index.html）
    location / {
        root /usr/share/nginx/host;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # demo 子应用（同源路径挂载，无需 CORS）
    location /micro/demo/ {
        alias /usr/share/nginx/demo/;
        index index.html;
        try_files $uri $uri/ /micro/demo/index.html;
    }
}
